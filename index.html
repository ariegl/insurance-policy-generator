<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnostic Policy Generator</title>
    <!-- Tailwind CSS via Play CDN (no install required) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PyScript CSS -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <!-- PyScript JS (deferred) -->
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-white shadow-lg rounded-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-2">Agnostic Policy Generator</h1>
        <p class="text-gray-600 text-center mb-6">Generate synthetic insurance policies client-side</p>

        <!-- Configuration Form -->
        <div class="grid grid-cols-1 gap-4 md:grid-cols-3 mb-6">
            <!-- Policy Type Dropdown -->
            <div>
                <label for="policy-type" class="block text-sm font-medium text-gray-700 mb-1">Policy Type</label>
                <select id="policy-type"
                        class="block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="" disabled selected>Select type...</option>
                    <option value="MedicalInsurance">Medical</option>
                    <option value="AutoInsurance">Auto</option>
                    <option value="LifeInsurance">Life</option>
                    <option value="HomeInsurance">Home</option>
                </select>
            </div>

            <!-- Quantity Input -->
            <div>
                <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                <input type="number" id="quantity" min="1" max="500" value="5"
                       class="block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"/>
            </div>

            <!-- Generate Button -->
            <div class="flex items-end">
                <button id="generate-btn"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    Generate
                </button>
            </div>
        </div>

        <!-- Loading indicator (hidden by default) -->
        <div id="processing-indicator" class="hidden text-center text-gray-500 py-4">
            <svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            <span>Processing… Please wait.</span>
        </div>

        <!-- Preview/Results Area -->
        <div id="preview-area" class="border border-dashed border-gray-300 rounded-lg p-4 min-h-[150px]">
            <p class="text-gray-400 text-sm text-center">Results will appear here after generation.</p>
        </div>

        <!-- Download Buttons (hidden until results are ready) -->
        <div id="download-section" class="hidden mt-4 flex flex-wrap gap-4 justify-center">
            <button id="download-pdf" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Download PDF</button>
            <button id="download-json" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Download JSON</button>
            <button id="download-txt" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Download TXT</button>
            <button id="download-zip" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Download ZIP</button>
        </div>
    </div>

    <!-- PyScript configuration for environments -->
    <py-config src="./py-config.json"></py-config>

    <!-- PyScript entry point -->
    <py-script src="./app/main.py"></py-script>
</body>
</html>
